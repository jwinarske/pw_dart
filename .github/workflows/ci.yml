name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      # The Flutter sub-package under example/graph_viewer/ is formatted
      # in the flutter-graph-viewer job below (its formatting tracks the
      # Flutter SDK's bundled dart format, which can differ from the
      # standalone Dart SDK used here).
      - run: dart format --output=none --set-exit-if-changed lib test hook tool example/*.dart

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart analyze --fatal-infos

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install PipeWire
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev pkg-config
      - run: dart pub get
      # Only the pure-Dart tests run on CI; the integration suite under
      # test/integration/ requires a running PipeWire daemon and is run
      # locally / on self-hosted runners.
      - run: dart test test/dart

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart doc --validate-links

  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find src test/native -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) \
            -not -name 'dart_api_dl*' \
            -print0 | xargs -0 clang-format --dry-run --Werror

  clang-tidy:
    runs-on: ubuntu-latest
    # The native CMake build is normally driven by hook/build.dart and pulls
    # in glaze as a header-only dependency at configure time. Reproducing
    # that in a standalone clang-tidy job is non-trivial, so this job is
    # advisory only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy libpipewire-0.3-dev pkg-config cmake
      - name: Generate compile_commands.json
        run: |
          cmake -S src -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          find src -type f \( -name '*.cpp' -o -name '*.hpp' \) \
            -not -name 'dart_api_dl*' \
            -print0 | xargs -0 clang-tidy -p build --extra-arg=-std=c++23

  flutter-graph-viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/graph_viewer
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart pub publish --dry-run
