name: pw_dart
description: >-
  First-class PipeWire bindings for Dart and Flutter via C++23 native code
  and dart:ffi. Stream graph events and mutate links on Linux.
version: 0.1.0

homepage: https://github.com/jwinarske/pw_dart
repository: https://github.com/jwinarske/pw_dart
issue_tracker: https://github.com/jwinarske/pw_dart/issues

topics:
  - pipewire
  - audio
  - linux
  - ffi
  - multimedia

environment:
  sdk: ^3.7.0

platforms:
  linux:

dependencies:
  ffi: ^2.1.0
  json_annotation: ^4.9.0
  meta: ^1.12.0
  hooks: ^1.0.0
  code_assets: ^1.0.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
